services:
  # 1. Ollama Service (LLM Server)
  ollama:
    image: ollama/ollama:latest
    container_name: financial-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - financial-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    mem_limit: 6g
    shm_size: "2gb"
    entrypoint: /bin/sh
    command: >
      -c "
      ollama serve &
      sleep 10 &&
      ollama pull qwen2.5-coder:3b-instruct-q4_0 &&
      wait
      "

  # 2. Service ETL (For Data Extraction, Transformation, and Loading)
  etl_app:
    build: .
    container_name: financial-analyst-etl
    depends_on:
      - ollama
    env_file: .env
    environment:
      - DATABASE_URL=sqlite:////app/data/database/financial_data.db
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - .:/app
    working_dir: /app
    command: sh entrypoint.sh
    networks:
      - financial-network

  # 3. Streamlit Dashboard 
  app:
    build: .
    container_name: financial-dashboard
    depends_on:
      - ollama
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - PYTHONPATH=/app/src:/app 
    volumes:
      - .:/app
    working_dir: /app
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    networks:
      - financial-network

volumes:
  ollama_data:

networks:
  financial-network:
    driver: bridge